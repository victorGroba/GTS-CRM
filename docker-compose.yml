version: '3.8'

services:
  gts-crm:
    build: .
    container_name: gts-crm-app
    restart: always
    ports:
      # MAPEAMENTO SEGURO: A porta 3006 atende sua VPS e leva internamente para a 3000 do app.
      # A porta 3005 já estava ocupada pelo projeto cdl.
      - "3006:3000"
    env_file:
      - .env
    # Se você já tem um banco Postgres rodando em outro container na mesma VPS,
    # Você terá que usar o IP interno / nome da rede, ou apontar o DATABASE_URL lá no .env da VPS.
